# kuuki-pod application configuration (on-target build for xiao_ble).

CONFIG_LOG=y

# SCD40 sampling (ticket 05): I²C bus + the Sensirion SCD4x sensor driver.
# CONFIG_SCD4X defaults on once the devicetree has an enabled sensirion,scd40
# node (see boards/xiao_ble.overlay); enable the sensor subsystem it needs.
CONFIG_I2C=y
CONFIG_SENSOR=y

# The sampler runs a dedicated thread and names it for debugging.
CONFIG_THREAD_NAME=y

# BLE GATT service (ticket 06): an open, connectable peripheral advertising the
# Pod ID + Live reading. No bonding — v1 GATT is open (spec / ADR-0001).
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="kuuki-pod"

# Pod ID is minted once and persisted in flash (separate from the RAM Buffer),
# so it survives a reset. The settings subsystem stores it over NVS on internal
# flash.
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
